<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formatação de textos</title>
</head>
<body>
    <h1>Principais formatações</h1>
    <h2>Negrito / Destaque</h2>
    <p>Nesta frase temos um <b> termo em negrito</b>Usando a tag B (não semantica).</p>
    <h2>Italico / Ênfase</h2>
    <p>Nesta frase, temos um <i>termo em italico</i> usando a tag I (não semantica).</p>
    <p>Nesta frase, temos um <em>termo em enfase</em> usando a tag EM (semantica).</p>
</body>
</html>
