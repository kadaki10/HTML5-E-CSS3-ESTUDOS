    <title>Estudos do iframe</title>
    <style>
        iframe {
            width: 400px;
            height: 400px;
            border: 1px dashed black;
        }
    </style>
</head>
<body>
    <h1>Testando o uso de um iframe</h1>

    <!-- Tamanho padrão 300x150 -->
    <p>Acessando o site do <iframe src="https://www.cursoemvideo.com" frameborder="0"
        height="500" scrolling="no">
        <a href="https://kadaki10.github.io/projeto-cordel/" target="_blank">projeto kadaki</a>
    </iframe>
    
        para aprender a programar.
    </p>
    <p>
        O repositorio do kadaki

        <iframe src="https://kadaki10.github.io/projeto-cordel/" frameborder="0"
        height="500">
            no <a href="https://kadaki10.github.io/projeto-cordel/" target="_blank">Github</a>
        </iframe>

        também é legal!
    </p>
</body>
</html>
